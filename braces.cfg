# 控制 if/for/while 后的大括号是否在同一行
# 设置为 "add" 表示强制换行（Allman 风格）
# 设置为 "remove" 表示强制不换行（K&R / Java 风格）
nl_if_brace          = remove
nl_for_brace         = remove
nl_while_brace       = remove
nl_else_brace        = remove
nl_else_if           = remove

# 函数定义的大括号风格
nl_fdef_brace        = remove   # { 与函数名同行（K&R）
# nl_fdef_brace      = add      # { 换行（Allman）

# switch, do-while 等
nl_switch_brace      = remove
nl_do_brace          = remove

# 其他可选：结构体/枚举
nl_struct_brace      = remove
nl_enum_brace        = remove



# 自动为单语句 if/for/while 添加大括号
mod_full_brace_if      = true
mod_full_brace_for     = true
mod_full_brace_while   = true
mod_full_brace_do      = true
mod_full_brace_if_chain = true
mod_full_brace_if_chain_only = true
